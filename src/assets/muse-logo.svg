<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background tile -->
  <rect x="0" y="0" width="200" height="200" rx="36" fill="#2E4D66"/>
  <!-- Outer gold ring -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#C9A84C" stroke-width="2.2"/>
  <!-- Inner ring subtle -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#C9A84C" stroke-width="0.6" opacity="0.3"/>
  <!-- Nib left face — lighter blue -->
  <path d="M100 36 L66 128 L100 152 Z" fill="#8DBDD8"/>
  <!-- Nib right face — mid blue -->
  <path d="M100 36 L134 128 L100 152 Z" fill="#6A9DBE"/>
  <!-- Shoulder cutout left -->
  <path d="M66 128 L84 107 L100 152 Z" fill="#2E4D66"/>
  <!-- Shoulder cutout right -->
  <path d="M134 128 L116 107 L100 152 Z" fill="#2E4D66"/>
  <!-- Center slit -->
  <line x1="100" y1="52" x2="100" y2="145" stroke="#2E4D66" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Breather hole -->
  <circle cx="100" cy="66" r="7" fill="#2E4D66"/>
  <!-- Gold ink drop -->
